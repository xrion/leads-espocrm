version: '3.8'

services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: espocrm
      MARIADB_USER: espo
      MARIADB_PASSWORD: espo
    volumes:
      - db_data:/var/lib/mysql

  espocrm:
    image: espocrm/espocrm
    restart: always
    ports:
      - "8085:80"
    depends_on:
      - db
    environment:
      ESPOCRM_DATABASE_HOST: db
      ESPOCRM_DATABASE_NAME: espocrm
      ESPOCRM_DATABASE_USER: espo
      ESPOCRM_DATABASE_PASSWORD: espo
    volumes:
      - espo_data:/var/www/html

  init:
    image: espocrm/espocrm
    depends_on:
      - db
      - espocrm
    entrypoint: >
      bash -c "
      echo '⏳ Waiting for EspoCRM...';
      sleep 15;

      echo '⚙️ Running install...';
      php command.php install \
        --db-host-name=db \
        --db-name=espocrm \
        --db-user-name=espo \
        --db-password=espo \
        --admin-user-name=admin \
        --admin-password=admin123 \
        --admin-email=admin@example.com \
        --site-url=http://localhost:8080;

      echo '✅ Done!';
      "
